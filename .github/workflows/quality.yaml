name: Rust Quality Pipeline

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: hops-ops

      - name: Checkout CLI
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch XR Meta Repo
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd "$GITHUB_WORKSPACE/.."
          meta git clone https://github.com/hops-ops/hops.git
          ln -s "$GITHUB_WORKSPACE/../hops/xrs" "$GITHUB_WORKSPACE/../xrs"

      - name: Link XR Metadata Source
        run: test -d "$GITHUB_WORKSPACE/../xrs"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Project
        run: cargo build --no-default-features --verbose

      - name: Run Tests
        run: cargo test --no-default-features --verbose
