name: On Version Tagged, Build and Publish Rust Binaries
on:
  push:
    tags:
    - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: hops-ops

      - name: Checkout CLI
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure GitHub Auth for Meta
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Fetch XR Meta Repo
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd "$GITHUB_WORKSPACE/.."
          meta git clone https://github.com/hops-ops/hops.git
          ln -s "$GITHUB_WORKSPACE/../hops/xrs" "$GITHUB_WORKSPACE/../xrs"

      - name: Link XR Metadata Source
        run: test -d "$GITHUB_WORKSPACE/../xrs"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release Binary
        run: cargo build --release --features vendored --verbose

      - name: Package Release Artifact
        run: |
          mkdir -p dist
          cp "target/release/${{ github.event.repository.name }}" "dist/${{ github.event.repository.name }}-linux-amd64"

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ github.event.repository.name }}-linux-amd64
